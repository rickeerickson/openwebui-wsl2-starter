version: "2"

run:
  timeout: 5m

linters:
  enable:
    - gosec
    - gocritic
    - bodyclose
    - noctx
    - errcheck
  settings:
    gosec:
      severity: medium
      confidence: medium
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
